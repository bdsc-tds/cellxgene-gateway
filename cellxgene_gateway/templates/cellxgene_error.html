<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Cellxgene Gateway - Error</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <link
      rel="icon"
      type="image/png"
      href="{{ url_for('static', filename='nibr.ico') }}"
    />
    {% for script in extra_scripts %}
    <script src="{{ script }}"></script>
    {% endfor %}
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/2.9.2/umd/popper.min.js"></script>
    <style>
      body {
        background: #f8f9fa;
      }
      .container-fluid {
        padding-left: 15px;
        padding-right: 15px;
      }
      .navbar {
        padding: 0.25rem 0;
        margin-bottom: 0.5rem;
      }
      .navbar-brand {
        font-size: 1.1rem;
        font-weight: 500;
      }
      .nav-link {
        padding: 0.25rem 0.5rem;
        font-size: 0.9rem;
      }
      h4 {
        font-size: 1.4rem;
        margin-bottom: 0.75rem;
      }
    </style>
  </head>
  <body>
    <div class="container-fluid py-1">
      <!-- Navbar -->
      <div class="row">
        <nav class="navbar navbar-expand-lg bg-body-tertiary">
          <div class="container-fluid">
            <a class="navbar-brand" href="/">Cellxgene Gateway</a>
            <button
              class="navbar-toggler"
              type="button"
              data-bs-toggle="collapse"
              data-bs-target="#navbarNav"
              aria-controls="navbarNav"
              aria-expanded="false"
              aria-label="Toggle navigation"
            >
              <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
              <ul class="navbar-nav">
                <li class="nav-item">
                  <a class="nav-link" href="/filecrawl.html">Datasets</a>
                </li>
                <li class="nav-item">
                  <a class="nav-link" href="/cache_status">Cache Status</a>
                </li>
              </ul>
            </div>
          </div>
        </nav>
      </div>
      <div class="row">
        <div class="col-12">
          <h4>{{ message }}</h4>
        </div>
      </div>
    </div>
  </body>
</html>

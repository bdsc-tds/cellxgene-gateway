<!DOCTYPE html>
<html lang="en">

<head>
  <!-- Default header -->
  {% include 'header.html' %}

  <!-- Page title -->
  <title>Loading - SSF BioHub</title>

  <!-- Stylesheets -->
  <link rel="stylesheet"
    href="{{ url_for('static', filename='css/navbar.css') }}" />
  <link rel="stylesheet"
    href="{{ url_for('static', filename='css/common.css') }}" />


  <!-- Miscellaneous -->
  <script>
    var count = 0
    window.setInterval(function() {
      var dots = document.getElementById('dots')
      dots.textContent = dots.textContent + '.'
      if (count++ > 5) {
        window.location.reload()
      }
    }, 1000)
  </script>
  <meta http-equiv="refresh" content="2.5" />
</head>

<body>
  <!-- Navbar -->
  {% include 'navbar.html' %}

  <div class="container-fluid py-1">
    <div class="row">
      <div class="col-12">
        <br>
        <h4>Output:</h4>
        <pre>{{ all_output }}</pre>
        <p>
          Launch Time:
          <span id="launch_time"> {{ launchtime.isoformat(' ') }} </span>
        </p>
        <p>The page will refresh shortly.</p>
        <p id="dots">Loading</p>
      </div>
    </div>
  </div>
</body>

</html>

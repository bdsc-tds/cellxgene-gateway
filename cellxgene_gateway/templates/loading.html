<!DOCTYPE html>
<html lang="en">

<head>
  <title>Loading - SSF BioHub</title>
  {% include 'header.html' %}

  <style>
    body {
      background: #f8f9fa;
    }

    .container-fluid {
      padding-left: 15px;
      padding-right: 15px;
    }

    .navbar {
      padding: 0.25rem 0;
      margin-bottom: 0.5rem;
    }

    .navbar-brand {
      font-size: 1.1rem;
      font-weight: 500;
    }

    .nav-link {
      padding: 0.25rem 0.5rem;
      font-size: 0.9rem;
    }

    h4 {
      font-size: 1.4rem;
      margin-bottom: 0.75rem;
    }

    pre {
      font-size: 0.8rem;
    }
  </style>
  <meta http-equiv="refresh" content="5" />
</head>

<body>
  <div class="container-fluid py-1">
    <!-- Navbar -->
    <div class="row">
      <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
          <a class="navbar-brand" href="{{ url_for('index') }}">SSF BioHub</a>
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
            data-bs-target="#navbarNav" aria-controls="navbarNav"
            aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
              <li class="nav-item">
                <a class="nav-link"
                  href="{{ url_for('filecrawl') }}">Datasets</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="/cache_status">Instances</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </div>
    <div class="row">
      <div class="col-12">

        <br />
        <h4>Output:</h4>
        <pre>{{ all_output }}</pre>
        <p>
          Launch Time:
          <span id="launch_time"> {{ launchtime.isoformat(' ') }} </span>
        </p>
        <p>The page will refresh shortly.</p>
        <p id="dots">Loading</p>
      </div>
    </div>
  </div>
  <script>
    var count = 0
    window.setInterval(function() {
      var dots = document.getElementById('dots')
      dots.textContent = dots.textContent + '.'
      if (count++ > 5) {
        window.location.reload()
      }
    }, 1000)
  </script>
</body>

</html>

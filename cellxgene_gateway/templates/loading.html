<!DOCTYPE html>
<html lang="en">

<head>
  <!-- Default header -->
  {% include 'header.html' %}

  <!-- Page title -->
  <title>Loading - SSF BioHub</title>

  <!-- Stylesheets -->
  <link rel="stylesheet"
    href="{{ url_for('static', filename='css/common.css') }}" />
  <link rel="stylesheet"
    href="{{ url_for('static', filename='css/loading.css') }}" />
  <link rel="stylesheet"
    href="{{ url_for('static', filename='css/navbar.css') }}" />

  <!-- Miscellaneous -->
  <meta http-equiv="refresh" content="2.5" />
</head>

<body>
  <!-- Navbar -->
  {% include 'navbar.html' %}

  <!-- Cellxgene information -->
  <div class="container-fluid p-3">
    <div class="row">
      <div class="col-12">
        <h2>Loading Dataset</h2>

        <!-- Launch time -->
        <p>Started: <span>{{ launchtime.isoformat(" ", "seconds") }}</span></p>

        <!-- Cellxgene log -->
        <pre>{{ all_output }}</pre>

        <!-- Status div with spinner -->
        <div id="status">
          <div class="loader"></div>
          <p>The page will refresh shortly</p>
        </div>
      </div>
    </div>
  </div>
</body>

</html>
